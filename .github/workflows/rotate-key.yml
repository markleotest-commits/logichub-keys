name: Rotate Key & Token

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone private repo
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/markleotest-commits/logichub-private.git private

      - name: Check if key needs rotation
        id: keycheck
        run: |
          if [ ! -f private/key.txt ]; then
            echo "rotate_key=true" >> $GITHUB_OUTPUT
          else
            LAST_KEY_TIME=$(cd private && git log -1 --format=%ct -- key.txt 2>/dev/null || echo "0")
            CURRENT_TIME=$(date +%s)
            AGE_SECONDS=$((CURRENT_TIME - LAST_KEY_TIME))
            AGE_HOURS=$((AGE_SECONDS / 3600))
            echo "Key age: $AGE_HOURS hours"
            if [ $AGE_HOURS -ge 4 ]; then
              echo "rotate_key=true" >> $GITHUB_OUTPUT
            else
              echo "rotate_key=false" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Generate new key
        if: steps.keycheck.outputs.rotate_key == 'true'
        run: |
          PART1=$(openssl rand -hex 2 | tr 'a-f' 'A-F')
          PART2=$(openssl rand -hex 2 | tr 'a-f' 'A-F')
          PART3=$(openssl rand -hex 2 | tr 'a-f' 'A-F')
          NEW_KEY="LOGIC-${PART1}-${PART2}-${PART3}"
          printf "%s" "$NEW_KEY" > private/key.txt
          echo "Generated key: $NEW_KEY"

      - name: Generate new token
        run: |
          NEW_TOKEN=$(openssl rand -hex 8)
          printf "%s" "$NEW_TOKEN" > private/token.txt
          echo "Generated token: $NEW_TOKEN"

      - name: Push to private repo
        run: |
          cd private
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add key.txt token.txt
          git commit -m "Rotate key/token" || echo "No changes"
          git push
          cd ..

      - name: Write hidden files to public repo
        run: |
          KEY=$(cat private/key.txt)
          TOKEN=$(cat private/token.txt)
          printf "%s" "$KEY" > d8f2a1.dat
          printf "%s" "$TOKEN" > t9x3b7.dat

      - name: Build key page
        run: |
          KEY=$(cat private/key.txt)
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head>
          <title>Logic Hub | Key</title>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
          <style>
          body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
          .box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; }
          h1 { color: #4ecdc4; }
          .key { font-family: 'Courier New', monospace; font-size: 28px; background: #0f3460; padding: 20px; border-radius: 8px; margin: 20px 0; color: #4ecdc4; letter-spacing: 2px; user-select: all; cursor: pointer; }
          .info { color: #aaa; font-size: 14px; margin: 8px 0; }
          .copy-btn { background: #4ecdc4; color: #16213e; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
          </style>
          </head>
          <body>
          <div class="box" id="content">
          <h1>Logic Hub Key</h1>
          <p class="info">Loading...</p>
          </div>
          <script>
          HTMLEOF
          echo "var KEY = \"$KEY\";" >> index.html
          cat >> index.html << 'HTMLEOF2'
          document.getElementById('content').innerHTML =
            '<h1>Logic Hub Key</h1>' +
            '<div class="info">Key refreshes every 4 hours</div>' +
            '<div class="key" onclick="copyKey()">' + KEY + '</div>' +
            '<button class="copy-btn" onclick="copyKey()">Copy Key</button>' +
            '<div class="info" style="margin-top:20px;font-size:12px;">Paste this key in the Logic Hub script.</div>';
          function copyKey() {
            navigator.clipboard.writeText(KEY);
            alert('Key copied!');
          }
          </script>
          </body>
          </html>
          HTMLEOF2

      - name: Commit public repo
        run: |
          rm -rf private
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html d8f2a1.dat t9x3b7.dat
          git commit -m "Update key page" || echo "No changes"
          git push
