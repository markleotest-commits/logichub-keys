<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logic Hub</title>
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23d4af37'/><text x='50' y='72' font-size='60' font-family='Arial' font-weight='bold' text-anchor='middle' fill='%230a0a0a'>L</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:'Inter',sans-serif;
    background:#050505;
    color:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    overflow-x:hidden;
}

canvas#particles{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    pointer-events:none;
    z-index:0;
}

body::before{
    content:'';
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:
        radial-gradient(ellipse at 50% -20%,rgba(212,175,55,.12) 0%,transparent 60%),
        radial-gradient(ellipse at 80% 80%,rgba(212,175,55,.04) 0%,transparent 50%),
        radial-gradient(ellipse at 20% 60%,rgba(212,175,55,.03) 0%,transparent 40%);
    pointer-events:none;
    z-index:1;
}

.container{
    position:relative;
    width:100%;
    max-width:460px;
    padding:20px;
    z-index:2;
}

.card{
    background:linear-gradient(160deg,rgba(18,18,18,.97),rgba(8,8,8,.99));
    border:1px solid rgba(212,175,55,.12);
    border-radius:20px;
    padding:44px 36px;
    text-align:center;
    backdrop-filter:blur(40px);
    box-shadow:
        0 0 80px rgba(0,0,0,.6),
        0 0 160px rgba(212,175,55,.02),
        inset 0 1px 0 rgba(255,255,255,.03);
    animation:cardIn .8s cubic-bezier(.16,1,.3,1);
    position:relative;
    overflow:hidden;
}

.card::before{
    content:'';
    position:absolute;
    top:-50%;left:-50%;
    width:200%;height:200%;
    background:conic-gradient(from 0deg,transparent,rgba(212,175,55,.03),transparent,rgba(212,175,55,.02),transparent);
    animation:rotateBg 15s linear infinite;
    z-index:0;
}

.card>*{position:relative;z-index:1;}

@keyframes cardIn{
    from{opacity:0;transform:translateY(30px) scale(.96)}
    to{opacity:1;transform:translateY(0) scale(1)}
}

@keyframes rotateBg{
    to{transform:rotate(360deg)}
}

.logo{
    width:56px;height:56px;
    margin:0 auto 20px;
    background:linear-gradient(135deg,#d4af37 0%,#f0d060 50%,#b8960c 100%);
    border-radius:14px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    font-weight:700;
    color:#0a0a0a;
    box-shadow:0 4px 24px rgba(212,175,55,.25),0 0 60px rgba(212,175,55,.08);
    animation:logoPulse 3s ease-in-out infinite;
}

.logo-error{background:linear-gradient(135deg,#e74c3c,#c0392b);box-shadow:0 4px 24px rgba(231,76,60,.25)}

@keyframes logoPulse{
    0%,100%{box-shadow:0 4px 24px rgba(212,175,55,.25),0 0 60px rgba(212,175,55,.08)}
    50%{box-shadow:0 4px 32px rgba(212,175,55,.35),0 0 80px rgba(212,175,55,.12)}
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:rgba(46,204,113,.08);
    border:1px solid rgba(46,204,113,.15);
    border-radius:20px;
    padding:4px 14px;
    margin-bottom:24px;
    font-size:11px;
    color:rgba(46,204,113,.9);
    font-weight:500;
    letter-spacing:.5px;
}

.badge-dot{
    width:6px;height:6px;
    background:#2ecc71;
    border-radius:50%;
    animation:pulse 2s infinite;
}

.badge-users{
    background:rgba(212,175,55,.08);
    border-color:rgba(212,175,55,.15);
    color:rgba(212,175,55,.9);
}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.title{
    font-size:22px;
    font-weight:700;
    color:#fff;
    letter-spacing:.3px;
    margin-bottom:4px;
}

.title-error{color:#e74c3c}

.subtitle{
    font-size:13px;
    color:rgba(255,255,255,.3);
    font-weight:300;
    margin-bottom:28px;
    line-height:1.5;
}

.key-container{
    background:rgba(212,175,55,.04);
    border:1px solid rgba(212,175,55,.1);
    border-radius:14px;
    padding:24px 20px;
    margin-bottom:20px;
    cursor:pointer;
    transition:all .4s cubic-bezier(.16,1,.3,1);
    position:relative;
    overflow:hidden;
}

.key-container:hover{
    border-color:rgba(212,175,55,.25);
    background:rgba(212,175,55,.08);
    transform:translateY(-2px);
    box-shadow:0 8px 30px rgba(212,175,55,.08);
}

.key-container::after{
    content:'';
    position:absolute;
    top:0;left:-100%;
    width:60%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(212,175,55,.06),transparent);
    animation:shimmer 3s ease-in-out infinite;
}

@keyframes shimmer{
    0%{left:-100%}
    50%{left:100%}
    100%{left:100%}
}

.key-label{
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:3px;
    color:rgba(212,175,55,.5);
    margin-bottom:14px;
    font-weight:600;
}

.key-value{
    font-family:'JetBrains Mono',monospace;
    font-size:24px;
    color:#d4af37;
    letter-spacing:4px;
    font-weight:600;
    user-select:all;
    word-break:break-all;
    text-shadow:0 0 30px rgba(212,175,55,.15);
}

.typewriter{
    overflow:hidden;
    border-right:2px solid rgba(212,175,55,.5);
    white-space:nowrap;
    animation:typing 1s steps(20) forwards,blink .6s step-end infinite alternate;
    display:inline-block;
}

@keyframes typing{from{width:0}to{width:100%}}
@keyframes blink{50%{border-color:transparent}}

.copy-btn{
    width:100%;
    padding:15px;
    background:linear-gradient(135deg,#d4af37 0%,#f0d060 50%,#b8960c 100%);
    background-size:200% 200%;
    animation:gradientShift 3s ease infinite;
    color:#0a0a0a;
    border:none;
    border-radius:12px;
    font-family:'Inter',sans-serif;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:all .3s ease;
    letter-spacing:.8px;
    margin-bottom:24px;
    position:relative;
    overflow:hidden;
}

@keyframes gradientShift{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

.copy-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 30px rgba(212,175,55,.35);
}

.copy-btn:active{transform:translateY(0)}

.copy-btn.copied{
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    animation:none;
}

.copy-btn .checkmark{display:none;margin-right:8px}
.copy-btn.copied .checkmark{display:inline}

.divider{
    width:50px;
    height:1px;
    background:linear-gradient(90deg,transparent,rgba(212,175,55,.2),transparent);
    margin:0 auto 20px;
}

.info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:20px;
}

.info-item{
    background:rgba(255,255,255,.02);
    border:1px solid rgba(255,255,255,.05);
    border-radius:10px;
    padding:14px 12px;
    text-align:left;
    transition:all .3s ease;
}

.info-item:hover{
    border-color:rgba(212,175,55,.12);
    background:rgba(212,175,55,.03);
}

.info-item .label{
    font-size:9px;
    text-transform:uppercase;
    letter-spacing:2px;
    color:rgba(255,255,255,.25);
    margin-bottom:6px;
    font-weight:500;
}

.info-item .value{
    font-size:13px;
    color:rgba(255,255,255,.75);
    font-weight:500;
}

.countdown{
    background:rgba(212,175,55,.06);
    border:1px solid rgba(212,175,55,.1);
    border-radius:10px;
    padding:14px;
    margin-bottom:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
}

.countdown-label{
    font-size:11px;
    color:rgba(255,255,255,.3);
    font-weight:400;
}

.countdown-value{
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    color:#d4af37;
    font-weight:500;
    letter-spacing:1px;
}

.footer-links{
    display:flex;
    justify-content:center;
    gap:16px;
    margin-bottom:12px;
}

.footer-link{
    font-size:11px;
    color:rgba(255,255,255,.2);
    text-decoration:none;
    transition:color .3s;
    cursor:pointer;
}

.footer-link:hover{color:rgba(212,175,55,.6)}

.footer{
    font-size:10px;
    color:rgba(255,255,255,.12);
    line-height:1.5;
}

.version{
    font-size:10px;
    color:rgba(255,255,255,.1);
    margin-top:8px;
    font-family:'JetBrains Mono',monospace;
}

.error-box{
    background:rgba(231,76,60,.06);
    border:1px solid rgba(231,76,60,.15);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
}

.error-box p{
    font-size:13px;
    color:rgba(255,255,255,.45);
    line-height:1.7;
}

.spinner{
    width:28px;height:28px;
    border:2px solid rgba(212,175,55,.08);
    border-top-color:#d4af37;
    border-radius:50%;
    animation:spin .7s linear infinite;
    margin:0 auto 16px;
}

@keyframes spin{to{transform:rotate(360deg)}}

.loading{color:rgba(255,255,255,.3);font-size:13px;font-weight:300}

@media(max-width:480px){
    .card{padding:36px 24px;border-radius:16px}
    .key-value{font-size:18px;letter-spacing:2px}
    .info-grid{grid-template-columns:1fr}
    .logo{width:48px;height:48px;font-size:22px}
}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="container">
    <div class="card" id="content">
        <div class="spinner"></div>
        <p class="loading">Verifying access...</p>
    </div>
</div>

<script>
// Gold particle system
var canvas=document.getElementById('particles');
var ctx=canvas.getContext('2d');
var particles=[];

function resizeCanvas(){
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize',resizeCanvas);

function createParticle(){
    return{
        x:Math.random()*canvas.width,
        y:canvas.height+10,
        size:Math.random()*2+0.5,
        speedY:Math.random()*0.8+0.2,
        speedX:(Math.random()-0.5)*0.3,
        opacity:Math.random()*0.4+0.1,
        life:0,
        maxLife:Math.random()*400+200
    };
}

for(var i=0;i<40;i++){
    var p=createParticle();
    p.y=Math.random()*canvas.height;
    p.life=Math.random()*p.maxLife;
    particles.push(p);
}

function animateParticles(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(function(p,idx){
        p.y-=p.speedY;
        p.x+=p.speedX;
        p.life++;
        var fadeRatio=1;
        if(p.life>p.maxLife*0.7){fadeRatio=1-(p.life-p.maxLife*0.7)/(p.maxLife*0.3);}
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
        ctx.fillStyle='rgba(212,175,55,'+(p.opacity*fadeRatio)+')';
        ctx.fill();
        if(p.life>=p.maxLife||p.y<-10){
            particles[idx]=createParticle();
        }
    });
    requestAnimationFrame(animateParticles);
}
animateParticles();

// Fake user counter
function randomUsers(){return Math.floor(Math.random()*80)+120;}
var userCount=randomUsers();

// Countdown timer
function getCountdown(){
    var now=new Date();
    var hours=3-now.getUTCHours()%4;
    var mins=59-now.getUTCMinutes();
    var secs=59-now.getUTCSeconds();
    return (hours<10?'0':'')+hours+':'+(mins<10?'0':'')+mins+':'+(secs<10?'0':'')+secs;
}

// Fetch key with validation
fetch('https://raw.githubusercontent.com/markleotest-commits/logichub-keys/main/t9x3b7.dat?nc='+Date.now())
.then(function(r){return r.text()})
.then(function(liveToken){
    liveToken=liveToken.trim();
    
    var hash=window.location.hash.substring(1);
    var params=new URLSearchParams(hash);
    var userToken=params.get('t');
    
    if(!userToken){
        try{
            var s=localStorage.getItem('logichub_token');
            var st=parseInt(localStorage.getItem('logichub_token_time')||'0');
            if(s&&(Date.now()-st)<5400000){userToken=s;}
        }catch(e){}
    }
    
    var c=document.getElementById('content');
    
    if(!userToken){
        c.innerHTML='<div class="logo logo-error">!</div><div class="title title-error">Access Denied</div><div class="subtitle">You must access this page through the Logic Hub script.</div><div class="error-box"><p>Get a fresh link by running the script and clicking "Copy Fresh Link" in the key prompt.</p></div><div class="footer">Tokens expire every hour. Bookmarking will not work.</div>';
        return;
    }
    
    if(userToken!==liveToken){
        c.innerHTML='<div class="logo logo-error">!</div><div class="title title-error">Token Expired</div><div class="subtitle">This link is no longer valid.</div><div class="error-box"><p>Tokens rotate every hour to prevent abuse.<br>Run the Logic Hub script again to get a fresh link.</p></div><div class="footer">Each token is valid for approximately 1 hour.</div>';
        return;
    }
    
    return fetch('https://raw.githubusercontent.com/markleotest-commits/logichub-keys/main/d8f2a1.dat?nc='+Date.now());
})
.then(function(r){if(r)return r.text()})
.then(function(key){
    if(!key)return;
    key=key.trim();
    window.currentKey=key;
    
    var c=document.getElementById('content');
    c.innerHTML=
        '<div class="logo">L</div>'+
        '<div class="title">Logic Hub</div>'+
        '<div class="badge"><span class="badge-dot"></span>Active Key</div>'+
        '<div class="badge badge-users">'+userCount+' users online</div>'+
        '<div class="key-container" onclick="copyKey()">'+
            '<div class="key-label">Your Access Key</div>'+
            '<div class="key-value"><span class="typewriter">'+key+'</span></div>'+
        '</div>'+
        '<button class="copy-btn" id="copyBtn" onclick="copyKey()"><span class="checkmark">&#10003;</span>Copy Key</button>'+
        '<div class="countdown" id="countdown">'+
            '<span class="countdown-label">Key refreshes in</span>'+
            '<span class="countdown-value" id="timer">'+getCountdown()+'</span>'+
        '</div>'+
        '<div class="divider"></div>'+
        '<div class="info-grid">'+
            '<div class="info-item"><div class="label">Refreshes</div><div class="value">Every 4 hours</div></div>'+
            '<div class="info-item"><div class="label">Status</div><div class="value">Valid</div></div>'+
            '<div class="info-item"><div class="label">Version</div><div class="value">v3.5</div></div>'+
            '<div class="info-item"><div class="label">Token</div><div class="value">1hr expiry</div></div>'+
        '</div>'+
        '<div class="footer-links">'+
            '<a class="footer-link" onclick="copyKey()">Copy Key</a>'+
            '<span class="footer-link" style="color:rgba(255,255,255,.08)">|</span>'+
            '<a class="footer-link" href="https://discord.gg/your-server" target="_blank">Discord</a>'+
            '<span class="footer-link" style="color:rgba(255,255,255,.08)">|</span>'+
            '<a class="footer-link" href="mailto:support@logichub.com">Report Issue</a>'+
        '</div>'+
        '<div class="footer">Paste this key in the Logic Hub script prompt to unlock.</div>'+
        '<div class="version">Logic Hub v3.5</div>';
    
    // Update countdown every second
    setInterval(function(){
        var el=document.getElementById('timer');
        if(el)el.textContent=getCountdown();
    },1000);
    
    // Update fake user count every 30s
    setInterval(function(){
        userCount+=Math.floor(Math.random()*5)-2;
        if(userCount<100)userCount=100+Math.floor(Math.random()*20);
    },30000);
})
.catch(function(){
    var c=document.getElementById('content');
    c.innerHTML='<div class="logo logo-error">!</div><div class="title title-error">Error</div><div class="subtitle">Could not verify access. Try refreshing.</div>';
});

function copyKey(){
    if(window.currentKey){
        navigator.clipboard.writeText(window.currentKey);
        var btn=document.getElementById('copyBtn');
        btn.innerHTML='<span class="checkmark">&#10003;</span>Copied!';
        btn.classList.add('copied');
        setTimeout(function(){
            btn.innerHTML='<span class="checkmark">&#10003;</span>Copy Key';
            btn.classList.remove('copied');
        },2500);
    }
}
</script>
</body>
</html>
