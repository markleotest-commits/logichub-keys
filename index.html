<!DOCTYPE html>
<html>
<head>
<title>Logic Hub | Key</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<style>
body { font-family: 'Segoe UI', Arial, sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
.box { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 16px; text-align: center; border: 1px solid rgba(255,255,255,0.1); max-width: 500px; }
h1 { color: #4ecdc4; }
.key { font-family: 'Courier New', monospace; font-size: 28px; background: #0f3460; padding: 20px; border-radius: 8px; margin: 20px 0; color: #4ecdc4; letter-spacing: 2px; user-select: all; cursor: pointer; }
.info { color: #aaa; font-size: 14px; margin: 8px 0; }
.copy-btn { background: #4ecdc4; color: #16213e; border: none; padding: 12px 24px; font-size: 16px; border-radius: 8px; cursor: pointer; margin-top: 10px; font-weight: bold; }
.copy-btn:hover { background: #3db8af; }
.loading { color: #4ecdc4; }
</style>
</head>
<body>
<div class="box" id="content">
<h1>🔑 Logic Hub Key</h1>
<p class="loading">Loading key...</p>
</div>
<script>
// Fetch key directly from GitHub raw file (always fresh)
fetch('https://raw.githubusercontent.com/markleotest-commits/logichub-keys/main/key.txt?nocache=' + Date.now())
  .then(function(r) { return r.text(); })
  .then(function(key) {
    key = key.trim();
    document.getElementById('content').innerHTML = 
      '<h1>🔑 Logic Hub Key</h1>' +
      '<div class="info">Key refreshes every 4 hours</div>' +
      '<div class="key" onclick="copyKey()">' + key + '</div>' +
      '<button class="copy-btn" onclick="copyKey()">📋 Copy Key</button>' +
      '<div class="info" style="margin-top:20px;font-size:12px;">Paste this key in the Logic Hub script prompt.</div>';
    
    window.currentKey = key;
  })
  .catch(function() {
    document.getElementById('content').innerHTML = 
      '<h1 style="color:#ff4757;">❌ Error</h1><p>Could not load key. Try refreshing.</p>';
  });

function copyKey() {
  if (window.currentKey) {
    navigator.clipboard.writeText(window.currentKey);
    alert('Key copied!');
  }
}
</script>
</body>
</html>
