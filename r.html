<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Logic Hub</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; display: flex; justify-content: center; align-items: center; }
.card { background: rgba(20,20,20,0.95); border: 1px solid rgba(212,175,55,0.15); border-radius: 16px; padding: 48px; text-align: center; max-width: 400px; }
.spinner { width: 32px; height: 32px; border: 2px solid rgba(212,175,55,0.1); border-top-color: #d4af37; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.text { color: rgba(255,255,255,0.4); font-size: 14px; }
.error { color: #e74c3c; font-size: 18px; font-weight: 600; margin-bottom: 8px; }
.sub { color: rgba(255,255,255,0.3); font-size: 13px; }
</style>
<script>
var queryParams = new URLSearchParams(window.location.search);
var hashParams = new URLSearchParams(window.location.hash.substring(1));
var token = queryParams.get('t') || queryParams.get('token') || hashParams.get('t') || hashParams.get('token');

if (!token) {
    try {
        var storedToken = localStorage.getItem('logichub_token');
        var storedTime = parseInt(localStorage.getItem('logichub_token_time') || '0');
        var ageMinutes = (Date.now() - storedTime) / 60000;
        if (storedToken && ageMinutes < 90) { token = storedToken; }
    } catch (e) {}
}

if (token) {
    window.location.replace("https://markleotest-commits.github.io/logichub-keys/#t=" + token);
} else {
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('content').innerHTML = '<div class="error">Access Denied</div><div class="sub">No valid token. Get a fresh link from the script.</div>';
    });
}
</script>
</head>
<body>
<div class="card" id="content">
    <div class="spinner"></div>
    <div class="text">Verifying access...</div>
</div>
</body>
</html>
