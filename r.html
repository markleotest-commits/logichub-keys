<script>
// First, try to get token from URL (in case shortener preserved it)
const queryParams = new URLSearchParams(window.location.search);
const hashParams = new URLSearchParams(window.location.hash.substring(1));
let token = queryParams.get('t') || queryParams.get('token') || hashParams.get('t') || hashParams.get('token');

// Fallback: check localStorage (set by start.html before Workink)
if (!token) {
    try {
        const storedToken = localStorage.getItem('logichub_token');
        const storedTime = parseInt(localStorage.getItem('logichub_token_time') || '0');
        const ageMinutes = (Date.now() - storedTime) / 60000;
        
        // Token valid if stored within last 90 minutes (extra buffer)
        if (storedToken && ageMinutes < 90) {
            token = storedToken;
        }
    } catch (e) {}
}

if (token) {
    window.location.replace("https://markleotest-commits.github.io/logichub-keys/#t=" + token);
} else {
    document.addEventListener('DOMContentLoaded', function() {
        document.body.innerHTML = '<div class="box"><h1 style="color:#ff4757;">❌ Invalid Access</h1><p>No token detected.</p><p style="color:#aaa;font-size:14px;">Please get a fresh link from the Logic Hub script.</p></div>';
    });
}
</script>
