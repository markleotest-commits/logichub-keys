<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loading...</title>
<style>
body { 
    font-family: 'Segoe UI', Arial, sans-serif; 
    background: linear-gradient(135deg, #1a1a2e, #16213e); 
    color: #fff; 
    display: flex; 
    justify-content: center; 
    align-items: center; 
    min-height: 100vh; 
    margin: 0;
    text-align: center;
}
.loader {
    border: 4px solid rgba(78, 205, 196, 0.2);
    border-top: 4px solid #4ecdc4;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    animation: spin 1s linear infinite;
    margin: 20px auto;
}
@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
.box {
    background: rgba(255,255,255,0.05);
    padding: 40px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.1);
}
</style>
<script>
// Capture token from URL (works with both ?t= and #t=)
const queryParams = new URLSearchParams(window.location.search);
const hashParams = new URLSearchParams(window.location.hash.substring(1));
const token = queryParams.get('t') || queryParams.get('token') || hashParams.get('t') || hashParams.get('token');

if (token) {
    // Redirect to actual key page WITH fragment
    window.location.replace("https://markleotest-commits.github.io/logichub-keys/#t=" + token);
} else {
    document.addEventListener('DOMContentLoaded', function() {
        document.body.innerHTML = '<div class="box"><h1 style="color:#ff4757;">❌ Invalid Access</h1><p>No token detected.</p><p style="color:#aaa;font-size:14px;">Please get a fresh link from the Logic Hub script.</p></div>';
    });
}
</script>
</head>
<body>
<div class="box">
    <div class="loader"></div>
    <h2 style="color:#4ecdc4;">🔑 Verifying access...</h2>
    <p style="color:#aaa;">Please wait...</p>
</div>
</body>
</html>
